services:
  mysql:
    image: mysql:8.0
    container_name: ytb2bili-mysql
    restart: unless-stopped
    command: --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: bili_up
      MYSQL_USER: ytb2bili
      MYSQL_PASSWORD: ytb2bili@123
    volumes:
      - ./data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ytb2bili:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        APP_BINARY: ${APP_BINARY:-ytb2bili-linux-arm64}
    container_name: ytb2bili-app
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8096:8096"
    volumes:
      - ./${APP_BINARY:-ytb2bili-linux-arm64}:/app/ytb2bili:ro
      - ./config.toml:/app/config.toml
      - ./downloads:/app/downloads
      - ./cookies:/tmp/cookies
    environment:
      - TZ=Asia/Shanghai
      - SERVICE_SECRET=${SERVICE_SECRET:-}


