      parameters:
      - description: 用户ID（可选，默认从Token获取）
        in: query
        name: user_id
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'list: array, total: int, page: int, size: int'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取用户订阅列表
      tags:
      - youtube
