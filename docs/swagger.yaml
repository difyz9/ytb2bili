      tags:
      - youtube
  /youtube/search/{keyword}:
    get:
      consumes:
      - application/json
      description: 使用YouTube API v3根据关键字搜索视频
      parameters:
      - description: 搜索关键字
        in: path
        name: keyword
        required: true
        type: string
      - default: 10
        description: 最大结果数量(1-50)
        in: query
        name: maxResults
        type: integer
      - default: relevance
        description: 排序方式
        in: query
        name: order
        type: string
      - default: video
        description: 搜索类型
        in: query
        name: type
        type: string
      - default: any
        description: 视频时长
        in: query
        name: videoDuration
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'videos: array'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
      summary: 根据关键字搜索YouTube视频
      tags:
      - youtube
  /youtube/trending:
    post:
      consumes:
      - application/json
      description: 获取YouTube热门视频列表
      parameters:
      - description: 热门视频请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.TrendingVideosRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'videos: array'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
      summary: 获取热门视频
      tags:
      - youtube
  /youtube/video/{videoId}:
    get:
      consumes:
      - application/json
      description: 根据视频ID获取YouTube视频详细信息
      parameters:
      - description: 视频ID
        in: path
        name: videoId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'video: object'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
      summary: 获取视频详情
      tags:
      - youtube
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
