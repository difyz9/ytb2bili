          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
      summary: 检查YouTube授权状态
      tags:
      - youtube
  /youtube/feed/refresh:
    get:
      consumes:
      - application/json
      description: 手动触发刷新用户订阅频道的最新视频
      produces:
      - application/json
      responses:
        "200":
          description: 'message: string'
          schema:
            additionalProperties: true
            type: object
      summary: 手动刷新订阅频道
      tags:
      - youtube
  /youtube/feed/videos:
    get:
      consumes:
      - application/json
      description: 获取订阅频道的最新视频（支持分页）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'videos: array, total: int, page: int'
          schema:
            additionalProperties: true
            type: object
