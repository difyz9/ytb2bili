    post:
      consumes:
      - application/json
      description: 从YouTube API同步用户的订阅频道列表
      parameters:
      - description: 用户ID
        in: query
        name: user_id
        required: true
        type: string
      - description: 访问令牌
        in: query
        name: access_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'synced: int'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
      summary: 同步用户订阅
      tags:
      - youtube
