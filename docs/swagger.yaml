      parameters:
      - default: US
        description: 地区代码
        in: query
        name: regionCode
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'categories: array'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 'error: string'
          schema:
            additionalProperties: true
            type: object
