      tags:
      - youtube
  /youtube/oauth/callback:
    get:
      consumes:
      - application/json
      description: 交换授权码获取访问令牌并保存用户订阅信息
      parameters:
      - description: 授权码
        in: query
        name: code
        required: true
        type: string
      - description: 状态值
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
